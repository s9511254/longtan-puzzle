<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>龍潭大池全等三角形拼圖</title>
    <style>
        /* 💡 核心佈局 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background: #f0f4f8; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
            overflow-y: auto; overflow-x: hidden; 
        }

        .header { 
            width: 100%; background: linear-gradient(135deg, #00796b 0%, #00acc1 100%); 
            color: white; padding: 15px 0; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        
        #main-container { 
            display: flex; justify-content: center; align-items: flex-start; 
            gap: 30px; padding-bottom: 80px;
        }
        
        #game-area { 
            position: relative; width: 1000px; height: 707px; 
            border: 4px solid #333; background: #fff; overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); border-radius: 4px; flex-shrink: 0; 
        }

        #map-bg { width: 1000px; height: 707px; object-fit: fill; position: absolute; top:0; left:0; z-index: 1; }

        /* 🚀 拼塊與動畫 */
        .flying-piece {
            position: absolute; transform-origin: center center; z-index: 100; pointer-events: none;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); width: 200px !important;
        }

        .liquid-glass-polygon {
            fill: url(#liquidGradient); filter: url(#liquidRefraction);
            stroke: rgba(255, 255, 255, 0.9); stroke-width: 2;
            stroke-linejoin: round; mix-blend-mode: color-dodge; pointer-events: none;
        }

        /* 📋 右側面板 */
        #mission-panel { 
            width: 320px; background: #fff; padding: 25px; 
            border-radius: 20px; border: 1px solid #e0e0e0; 
            box-sizing: border-box; position: sticky; top: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); flex-shrink: 0;
        }

        .current-piece-box { 
            width: 100%; height: 350px; margin: 20px 0; 
            border: 2px solid #00acc1; border-radius: 16px; background: #e0f7fa; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #active-box img { max-width: 260px !important; max-height: 260px !important; border-radius: 8px; }
        
        svg { position: absolute; top: 0; left: 0; width: 1000px; height: 707px; z-index: 50; pointer-events: none; }
        .is-dragging svg { pointer-events: auto; }
        .target-poly { fill: rgba(255,255,255,0.001); cursor: move; pointer-events: auto; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, #00acc1 0%, #00796b 100%); transition: width 0.5s; }

        /* 🎨 自定義對話框 (解決網址標籤問題) */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9998; backdrop-filter: blur(3px);
        }
        #custom-dialog {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 9999; text-align: center; border: 2px solid #00acc1;
        }
        #custom-dialog h2 { margin-top: 0; color: #00796b; font-size: 20px; }
        #custom-dialog input { 
            width: 80%; padding: 10px; margin: 15px 0; border: 2px solid #ddd; 
            border-radius: 8px; font-size: 18px; text-align: center; text-transform: uppercase;
        }
        #custom-dialog button { 
            padding: 10px 30px; background: #00acc1; color: white; border: none; 
            border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
        }
        #custom-dialog button:hover { background: #00796b; }
    </style>
</head>
<body id="main-body">

<div class="header">
    <h1>🧩 龍潭大池全等三角形拼圖</h1>
</div>

<div id="main-container">
    <div id="game-area">
        <img id="map-bg" src="bg00.jpg">
        <svg id="svg-layer" viewBox="0 0 1000 707">
            <defs>
                <radialGradient id="liquidGradient" cx="50%" cy="50%" r="80%" fx="30%" fy="30%">
                    <stop offset="0%" style="stop-color:white; stop-opacity:0.8" />
                    <stop offset="30%" style="stop-color:#e0f7fa; stop-opacity:0.3" />
                    <stop offset="60%" style="stop-color:#81d4fa; stop-opacity:0.1" />
                    <stop offset="100%" style="stop-color:white; stop-opacity:0.4" />
                </radialGradient>
                <filter id="liquidRefraction" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
                    <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1.2" specularExponent="20" lighting-color="#e0f7fa" result="specOut">
                        <fePointLight x="-5000" y="-10000" z="20000"/>
                    </feSpecularLighting>
                    <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specChar"/>
                    <feMerge>
                        <feMergeNode in="SourceGraphic"/><feMergeNode in="specChar"/>
                    </feMerge>
                </filter>
            </defs>
            <g id="placed-polygons"></g>
            <g id="sensor-layer"></g>
        </svg>
        <div id="animation-layer"></div>
    </div>

    <div id="mission-panel">
        <h3 id="prog-text">進度：1 / 36</h3>
        <div style="width:100%; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden;">
            <div id="progress-fill" style="width:2.7%"></div>
        </div>
        <div id="active-box" class="current-piece-box"></div>
        <p style="font-size: 14px; color: #00796b; font-weight:bold;">請將三角形放入正確位置</p>
    </div>
</div>

<div id="modal-overlay"></div>
<div id="custom-dialog">
    <h2 id="dialog-title">訊息</h2>
    <p id="dialog-msg"></p>
    <input type="text" id="dialog-input" placeholder="請輸入性質 (如: SAS)">
    <br>
    <button id="dialog-confirm">確定</button>
</div>

<script>
    const triangleData = {"10":[{"x":623,"y":371},{"x":683,"y":248},{"x":850,"y":357}],"11":[{"x":539,"y":546},{"x":619,"y":379},{"x":718,"y":540}],"12":[{"x":668,"y":448},{"x":926,"y":505},{"x":771,"y":615}],"13":[{"x":384,"y":450},{"x":593,"y":419},{"x":533,"y":546}],"14":[{"x":380,"y":453},{"x":526,"y":550},{"x":373,"y":642}],"15":[{"x":245,"y":362},{"x":372,"y":449},{"x":302,"y":550}],"16":[{"x":56,"y":263},{"x":163,"y":482},{"x":51,"y":671}],"17":[{"x":61,"y":256},{"x":435,"y":36},{"x":278,"y":221}],"18":[{"x":240,"y":367},{"x":298,"y":551},{"x":140,"y":531}],"19":[{"x":690,"y":244},{"x":956,"y":178},{"x":857,"y":355}],"20":[{"x":861,"y":360},{"x":960,"y":184},{"x":930,"y":495}],"21":[{"x":321,"y":228},{"x":373,"y":442},{"x":245,"y":357}],"22":[{"x":536,"y":553},{"x":712,"y":544},{"x":557,"y":699}],"23":[{"x":290,"y":578},{"x":374,"y":457},{"x":367,"y":639}],"24":[{"x":624,"y":376},{"x":734,"y":370},{"x":664,"y":440}],"25":[{"x":746,"y":368},{"x":856,"y":362},{"x":842,"y":478}],"26":[{"x":641,"y":77},{"x":878,"y":40},{"x":747,"y":196}],"27":[{"x":377,"y":647},{"x":531,"y":555},{"x":552,"y":704}],"28":[{"x":141,"y":538},{"x":296,"y":558},{"x":195,"y":701}],"29":[{"x":742,"y":369},{"x":836,"y":481},{"x":668,"y":444}],"30":[{"x":136,"y":539},{"x":187,"y":702},{"x":55,"y":677}],"31":[{"x":860,"y":367},{"x":925,"y":500},{"x":848,"y":482}],"32":[{"x":286,"y":583},{"x":365,"y":644},{"x":199,"y":703}],"33":[{"x":751,"y":199},{"x":879,"y":46},{"x":830,"y":203}],"34":[{"x":886,"y":42},{"x":957,"y":171},{"x":836,"y":202}],"35":[{"x":723,"y":544},{"x":784,"y":647},{"x":564,"y":701}],"36":[{"x":58,"y":259},{"x":317,"y":222},{"x":167,"y":477}],"01":[{"x":493,"y":195},{"x":815,"y":207},{"x":490,"y":287}],"02":[{"x":492,"y":292},{"x":676,"y":248},{"x":598,"y":411}],"03":[{"x":491,"y":297},{"x":593,"y":413},{"x":509,"y":426}],"04":[{"x":383,"y":444},{"x":488,"y":297},{"x":504,"y":426}],"05":[{"x":327,"y":224},{"x":485,"y":291},{"x":378,"y":442}],"06":[{"x":331,"y":220},{"x":489,"y":196},{"x":487,"y":287}],"07":[{"x":494,"y":193},{"x":634,"y":77},{"x":742,"y":199}],"08":[{"x":444,"y":35},{"x":626,"y":77},{"x":493,"y":190}],"09":[{"x":442,"y":35},{"x":488,"y":192},{"x":283,"y":221}]};
    const answers = {"10":["AAS"],"11":["SSS"],"12":["ASA"],"13":["ASA"],"14":["SAS"],"15":["ASA"],"16":["ASA"],"17":["ASA"],"18":["ASA"],"19":["ASA"],"20":["ASA"],"21":["SSS","SAS","RHS"],"22":["AAS"],"23":["ASA"],"24":["SAS"],"25":["SSS"],"26":["ASA"],"27":["AAS"],"28":["AAS"],"29":["SAS"],"30":["ASA"],"31":["ASA"],"32":["RHS"],"33":["ASA"],"34":["ASA"],"35":["SAS"],"36":["AAS","ASA"],"01":["ASA"],"02":["ASA"],"03":["SAS"],"04":["RHS"],"05":["SAS"],"06":["ASA","SAS","SSS","AAS"],"07":["SAS"],"08":["SSS"],"09":["ASA"]};

    let currentNum = 1;
    let currentTargetId = null;
    const Y_RATIO = 707 / 750;

    // 💡 自定義彈窗邏輯
    function openDialog(mode, title, msg, callback) {
        document.getElementById('dialog-title').innerText = title;
        document.getElementById('dialog-msg').innerText = msg;
        const input = document.getElementById('dialog-input');
        input.style.display = (mode === 'prompt') ? 'inline-block' : 'none';
        input.value = "";
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('custom-dialog').style.display = 'block';
        
        document.getElementById('dialog-confirm').onclick = () => {
            const val = input.value;
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('custom-dialog').style.display = 'none';
            if (callback) callback(val);
        };
    }

    function initAllSensors() {
        const layer = document.getElementById('sensor-layer');
        layer.innerHTML = "";
        Object.keys(triangleData).forEach(id => {
            const pts = triangleData[id];
            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", pts.map(p => `${p.x},${p.y * Y_RATIO}`).join(" "));
            poly.setAttribute("class", "target-poly");
            poly.setAttribute("data-id", id);
            poly.ondragover = (e) => e.preventDefault();
            poly.ondrop = handleDrop;
            layer.appendChild(poly);
        });
    }

    function updateGame() {
        const total = 36;
        if (currentNum > total) {
            document.getElementById('prog-text').innerText = `挑戰完成！${total} / ${total}`;
            document.getElementById('progress-fill').style.width = "100%";
            document.getElementById('active-box').innerHTML = "<h1>🏆</h1>";
            return;
        }
        const id = currentNum.toString().padStart(2, '0');
        document.getElementById('prog-text').innerText = `進度：${currentNum} / ${total}`;
        document.getElementById('progress-fill').style.width = (currentNum/total*100) + "%";
        document.getElementById('active-box').innerHTML = `<div id="drag-piece" draggable="true" style="cursor:move"><img src="piece${id}.png"></div>`;
        document.getElementById('drag-piece').ondragstart = (e) => {
            e.dataTransfer.setData("text", id);
            document.getElementById('main-body').classList.add('is-dragging');
        };
        document.getElementById('drag-piece').ondragend = () => document.getElementById('main-body').classList.remove('is-dragging');
    }

    function handleDrop(e) {
        e.preventDefault();
        const pId = e.dataTransfer.getData("text");
        const tId = e.target.getAttribute("data-id");
        if (pId === tId) {
            openDialog('prompt', '位置正確！', '請輸入全等性質：', (val) => {
                if (val && answers[tId].includes(val.toUpperCase().trim())) {
                    playAnimate(pId);
                } else {
                    openDialog('alert', '錯誤', '性質不正確！再觀察看看喔', null);
                }
            });
        } else {
            openDialog('alert', '哎呀', '位置不對喔！', null);
        }
    }

    function playAnimate(id) {
        const pts = triangleData[id];
        const cX = (pts[0].x + pts[1].x + pts[2].x) / 3;
        const cY = (pts[0].y + pts[1].y + pts[2].y) / 3 * Y_RATIO;
        const img = document.createElement('img');
        img.src = `piece${id}.png`; img.className = 'flying-piece';
        img.style.right = "50px"; img.style.top = "200px";
        document.getElementById('animation-layer').appendChild(img);
        setTimeout(() => {
            img.style.left = (cX - 100) + "px"; img.style.top = (cY - 100) + "px";
            img.style.opacity = "0";
            setTimeout(() => {
                document.getElementById('map-bg').src = `bg${id}.jpg`;
                addPermanentGlaze(id);
                img.remove(); currentNum++; updateGame();
            }, 650);
        }, 50);
    }

    function addPermanentGlaze(id) {
        const pts = triangleData[id];
        const glaze = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        glaze.setAttribute("points", pts.map(p => `${p.x},${p.y * Y_RATIO}`).join(" "));
        glaze.setAttribute("class", "liquid-glass-polygon");
        document.getElementById('placed-polygons').appendChild(glaze);
    }

    
    window.onload = () => { initAllSensors(); updateGame(); };
</script>
</body>
</html>
